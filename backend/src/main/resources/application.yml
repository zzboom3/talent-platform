server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/talent_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: talent-platform-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:https://oss-cn-chengdu.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:talent-platform-files}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}

logging:
  level:
    com.talent: DEBUG
    org.hibernate.SQL: WARN
