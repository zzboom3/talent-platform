server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/talent_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: talent-platform-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

logging:
  level:
    com.talent: DEBUG
    org.hibernate.SQL: WARN
