version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: talent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: talent_platform
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always
    mem_limit: 512m

  backend:
    build: ./backend
    container_name: talent-backend
    depends_on:
      mysql:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/talent_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-https://oss-cn-chengdu.aliyuncs.com}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-talent-platform-files}
    restart: always
    mem_limit: 768m

  nginx:
    image: nginx:alpine
    container_name: talent-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

volumes:
  mysql-data:
